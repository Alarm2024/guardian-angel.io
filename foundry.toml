[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Compiler settings aligned with RashidAward deployment specifications
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# Security and EVM target auditing configurations
evm_version = "paris"
gas_reports = ["RashidAward"]
verbosity = 2

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
